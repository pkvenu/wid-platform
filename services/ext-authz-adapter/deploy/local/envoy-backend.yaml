# =============================================================================
# Envoy Backend Sidecar — validates inbound requests via ext_authz
# =============================================================================
#
# Flow:
#   Frontend Envoy → :10001 → ext_authz check → demo-backend:9090
#
# This simulates the receiving side: validating that the calling workload
# has proper authorization (x-wid-token-jti header from the frontend's adapter call).
# =============================================================================

static_resources:
  listeners:
    - name: backend_inbound
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10001
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: backend_inbound
                codec_type: AUTO
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      grpc_service:
                        envoy_grpc:
                          cluster_name: ext_authz_cluster
                        timeout: 0.5s
                      failure_mode_allow: false
                      include_peer_certificate: true
                      status_on_error:
                        code: 503
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: backend_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: demo_backend
                            timeout: 30s

  clusters:
    - name: ext_authz_cluster
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: ext_authz_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ext-authz-adapter
                      port_value: 9191

    - name: demo_backend
      type: STRICT_DNS
      connect_timeout: 5s
      load_assignment:
        cluster_name: demo_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: demo-backend
                      port_value: 9090

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9902