resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

server {
    listen 3100;
    root /usr/share/nginx/html;
    index index.html;

    # Common proxy settings for cookie-based auth
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;

    # Auth routes → policy-sync-service (port 3001)
    location /api/v1/auth {
        set $policy http://policy-sync-service:3001;
        proxy_pass $policy;
    }

    # Discovery service routes (internal port 3003)
    # Uses variables so nginx resolves at runtime, not startup (Cloud Run safe)
    location /api/v1/graph {
        set $discovery http://discovery-service:3003;
        proxy_pass $discovery;
    }
    location /api/v1/workloads {
        set $discovery http://discovery-service:3003;
        proxy_pass $discovery;
    }

    # Policy engine routes (port 3001)
    location /api/v1/policies {
        set $policy http://policy-sync-service:3001;
        proxy_pass $policy;
    }
    location /api/v1/violations {
        set $policy http://policy-sync-service:3001;
        proxy_pass $policy;
    }
    location /api/v1/access {
        set $policy http://policy-sync-service:3001;
        proxy_pass $policy;
    }
    location /api/v1/enforcement {
        set $policy http://policy-sync-service:3001;
        proxy_pass $policy;
    }
    location /api/v1/gateway {
        set $policy http://policy-sync-service:3001;
        proxy_pass $policy;
    }
    location /api/v1/governance {
        set $policy http://policy-sync-service:3001;
        proxy_pass $policy;
    }

    # Catch-all /api/v1 → discovery
    location /api/v1 {
        set $discovery http://discovery-service:3003;
        proxy_pass $discovery;
    }

    # Relay routes
    location /api/relay {
        set $relay http://relay-service:3005;
        proxy_pass $relay;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # SPA fallback — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
