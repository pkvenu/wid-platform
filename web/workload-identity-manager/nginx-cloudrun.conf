server {
    listen 3100;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # SPA fallback — all routes handled client-side
    location / {
        try_files $uri $uri/ /index.html;
    }
}
