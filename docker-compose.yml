# =============================================================================
# WID Platform — Docker Spoke (Data Plane Only)
# =============================================================================
#
# Connects to the GCP central control plane via the relay hub.
# No local database, no local UI, no duplicate core services.
#
# Architecture:
#   relay (spoke) ──→ GCP relay (hub) at $CENTRAL_URL
#   edge-gateway(s) ──→ local relay ──→ GCP central
#
# Usage:
#   docker compose up --build
#   # Then start demo agents from the wid-demo-agents project:
#   cd ../wid-demo-agents && docker compose up --build
#
# What this runs:
#   relay                    — Spoke: policy cache + audit forwarder → GCP hub
#   7 edge-gateways          — Sidecar proxies, one per agent
#
# Demo agents run from the separate wid-demo-agents project,
# joining the wid-spoke-network created here.
#
# =============================================================================

services:

  # ══════════════════════════════════════════════════════════════
  # WID Relay (SPOKE — connects to GCP central control plane)
  # ══════════════════════════════════════════════════════════════
  relay:
    build:
      context: ./services/relay-service
    container_name: wid-spoke-relay
    restart: on-failure
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      ENVIRONMENT_NAME: local-docker
      ENVIRONMENT_TYPE: docker
      REGION: local
      CLUSTER_ID: docker-desktop
      # Connect to GCP central control plane (hub)
      CENTRAL_CONTROL_PLANE_URL: ${CENTRAL_URL:-http://34.120.74.81}
      CENTRAL_API_KEY: ${CENTRAL_API_KEY:-}
      # Sync settings — faster for local dev
      POLICY_SYNC_INTERVAL_MS: "15000"
      AUDIT_FLUSH_INTERVAL_MS: "5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - spoke-net

  # ══════════════════════════════════════════════════════════════
  # Edge Gateways — One per agent (sidecar pattern)
  # All point to the local spoke relay for policy + token + creds
  # Agents run from wid-demo-agents project on the same network
  # ══════════════════════════════════════════════════════════════

  gw-servicenow:
    build:
      context: .
      dockerfile: services/edge-gateway/Dockerfile
    container_name: wid-gw-servicenow
    restart: on-failure
    ports:
      - "8001:15001"       # Access servicenow-it-agent through here
      - "15100:15000"      # Admin/metrics
    environment:
      OUTBOUND_PORT: 15001
      INBOUND_PORT: 15006
      ADMIN_PORT: 15000
      APP_PORT: 6001
      APP_HOST: servicenow-it-agent
      WORKLOAD_NAME: servicenow-it-agent
      WORKLOAD_NS: demo-blended
      TRUST_DOMAIN: company.com
      DEFAULT_MODE: audit
      FAIL_BEHAVIOR: open
      POLICY_SERVICE_URL: http://relay:3005
      TOKEN_SERVICE_URL: http://relay:3005
      BROKER_URL: http://relay:3005
      LOG_LEVEL: info
      STRUCTURED_LOGS: "true"
    depends_on:
      - relay
    networks:
      - spoke-net

  gw-github-actions:
