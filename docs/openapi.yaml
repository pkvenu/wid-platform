  /v1/token/exchange:
    post:
      tags:
      - Token
      summary: Exchange workload identity for a scoped access token
      description: 'The Trust Gate. Resolves caller identity (mTLS, OIDC, or API key),

        evaluates OPA policy, and issues a scoped JWT with OBO chain tracking.

        Fail-closed: denies on OPA unavailability.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - audience
              properties:
                audience:
                  type: string
                  description: Target service or API the token grants access to
                capability:
                  type: string
                  description: Requested capability (default token:exchange)
                resource:
                  type: string
                  description: Optional specific resource identifier
                parent_jti:
                  type: string
                  description: Parent token JTI for On-Behalf-Of chain
                scopes:
                  type: array
                  items:
                    type: string
                  description: Requested scopes
                subject:
                  type: string
                  description: Explicit subject (testing only)
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 3600
                  scope:
                    type: array
                    items:
                      type: string
                  token_jti:
                    type: string
                  root_jti:
                    type: string
                  chain_depth:
                    type: integer
                  capability:
                    type: string
                  policy_decision:
                    type: object
                    properties:
                      allowed:
                        type: boolean
                      reason:
                        type: string
                  request_id:
                    type: string
        '400':
          description: Missing required field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Could not resolve caller identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Policy evaluation denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  reason:
                    type: string
                  workload:
                    type: string
                  audience:
                    type: string
                  capability:
                    type: string
                  request_id:
                    type: string
        '404':
          description: Workload not found in identity platform
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/token/validate:
    post:
      tags:
