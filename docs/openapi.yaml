  /gateway/proxy:
    post:
      tags:
      - Gateway
      summary: Edge gateway proxy with policy enforcement
      description: 'The enforcement point. Evaluates policy for source/destination pair, then

        either forwards the request (ALLOW) or returns 403 (DENY). Fail-closed on

        policy engine unavailability.

        '
      parameters:
      - name: X-WID-Source
        in: header
        required: true
        schema:
          type: string
        description: Source workload identity
      - name: X-WID-Destination
        in: header
        schema:
          type: string
        description: Destination workload identity
      - name: X-WID-Target-URL
        in: header
        schema:
          type: string
        description: URL to proxy the request to (if allowed)
      - name: X-WID-Trace-Id
        in: header
        schema:
          type: string
      responses:
        '200':
          description: Request allowed (and proxied if target URL provided)
          content:
            application/json:
              schema:
                type: object
                properties:
                  enforcement_action:
                    type: string
                    example: FORWARD_REQUEST
                  decision_id:
                    type: string
                  policy_name:
                    type: string
                  source:
                    type: string
                  destination:
                    type: string
                  gateway:
                    type: string
        '400':
          description: Missing destination or target URL header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied by policy
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  enforcement_action:
                    type: string
                    example: REJECT_REQUEST
                  decision_id:
                    type: string
                  policy_name:
                    type: string
                  reason:
                    type: string
                  source:
                    type: string
                  destination:
                    type: string
                  gateway:
                    type: string
                  detail:
                    type: string
        '502':
          description: Upstream unreachable (policy allowed but forward failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Policy engine unavailable (fail-closed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/credentials/request:
    post:
      tags:
      - Gateway
      summary: Request a JIT (Just-In-Time) credential
      description: 'Policy-evaluated credential issuance. Issues a short-lived, scoped bearer

        token for a workload to access a target API. Max TTL 1 hour.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - workload
              - target_api
              properties:
                workload:
                  type: string
                target_api:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                  default:
                  - read
                ttl_seconds:
                  type: integer
                  maximum: 3600
                  default: 300
                tenant_id:
                  type: string
      responses:
        '201':
          description: JIT credential issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  credential_id:
                    type: string
                  enforcement_action:
                    type: string
                    example: ISSUE_CREDENTIAL
                  type:
                    type: string
                    example: jit-bearer-token
                  token:
                    type: string
                  target_api:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  expires_at:
                    type: string
                    format: date-time
                  ttl_seconds:
                    type: integer
                  policy_decision_id:
                    type: string
                  detail:
                    type: string
        '403':
          description: Credential request denied by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/credentials/validate:
    post:
      tags:
      - Gateway
      summary: Validate a JIT credential token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
                target_api:
                  type: string
                  description: Optional audience check
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  reason:
                    type: string
                  credential_id:
                    type: string
                  workload:
                    type: string
                  target_api:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  expires_at:
                    type: string
                    format: date-time
  /api/v1/credentials/active:
    get:
      tags:
      - Gateway
      summary: List active JIT credentials
      responses:
        '200':
          description: Active credential list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  credentials:
                    type: array
                    items:
                      type: object
                      properties:
                        credential_id:
                          type: string
                        workload:
                          type: string
                        target_api:
                          type: string
                        scopes:
                          type: array
                          items:
                            type: string
                        expires_at:
                          type: string
                          format: date-time
                        ttl_remaining_s:
                          type: integer
  /api/v1/delegation/initiate:
    post:
      tags:
      - Delegation
      summary: Initiate an OBO delegation chain
      description: 'Creates a new delegation chain with scope ceiling enforcement.

        Each subsequent hop can only narrow scopes, never widen.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - principal
              - target
              properties:
                principal:
                  type: string
                  description: Root principal initiating delegation
                target:
                  type: string
                  description: First delegate
                scopes:
                  type: array
                  items:
                    type: string
                  default:
                  - read
                  - write
                  - admin
                context:
                  type: object
                tenant_id:
                  type: string
      responses:
        '201':
          description: Delegation chain initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  chain_id:
                    type: string
                  enforcement_action:
                    type: string
                    example: INITIATE_DELEGATION
                  token:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  expires_at:
                    type: string
                    format: date-time
                  scope_ceiling:
                    type: array
                    items:
                      type: string
                  hop:
                    type: integer
                  detail:
                    type: string
        '403':
          description: Delegation denied by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/delegation/extend:
    post:
      tags:
      - Delegation
      summary: Extend a delegation chain with a new hop
      description: 'Adds a hop to an existing chain. Requested scopes are intersected with

        the current scope ceiling. Fails if no scopes remain.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - chain_id
              - token
              - target
              properties:
                chain_id:
                  type: string
                token:
                  type: string
                  description: Token from the last hop
                target:
                  type: string
                  description: Next delegate
                requested_scopes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Delegation extended
          content:
            application/json:
              schema:
                type: object
                properties:
                  chain_id:
                    type: string
                  enforcement_action:
                    type: string
                    example: EXTEND_DELEGATION
                  token:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  expires_at:
                    type: string
                    format: date-time
                  scope_ceiling:
                    type: array
                    items:
                      type: string
                  hop:
                    type: integer
                  detail:
                    type: string
        '403':
          description: Scope ceiling exceeded or delegation denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Chain not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/delegation/chains:
    get:
      tags:
      - Delegation
      summary: List active delegation chains
      responses:
        '200':
          description: Chain list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  chains:
                    type: array
                    items:
                      type: object
                      properties:
                        chain_id:
                          type: string
                        root_principal:
                          type: string
                        scope_ceiling:
                          type: array
                          items:
                            type: string
                        current_scopes:
                          type: array
                          items:
                            type: string
                        total_hops:
                          type: integer
                        created_at:
                          type: string
                          format: date-time
  /api/v1/delegation/chains/{chainId}:
    get:
      tags:
      - Delegation
      summary: Inspect a delegation chain
      parameters:
      - name: chainId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Chain detail with all hops
          content:
            application/json:
              schema:
                type: object
                properties:
                  chain_id:
                    type: string
                  root_principal:
                    type: string
                  scope_ceiling:
                    type: array
                    items:
                      type: string
                  current_scopes:
                    type: array
                    items:
                      type: string
                  total_hops:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                  hops:
                    type: array
                    items:
                      type: object
                      properties:
                        hop:
                          type: integer
                        from:
                          type: string
                        to:
                          type: string
                        scopes:
                          type: array
                          items:
                            type: string
                        granted_at:
                          type: string
                          format: date-time
                        expires_at:
                          type: string
                          format: date-time
                        decision_id:
                          type: string
        '404':
          description: Chain not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
