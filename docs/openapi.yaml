                        format: date-time
                      origin:
                        type: string
                      final_verdict:
                        type: string
                      chain_authorized:
                        type: boolean
                      total_hops:
                        type: integer
                      hops:
                        type: array
                        items:
                          type: object
                          properties:
                            hop_index:
                              type: integer
                            decision_id:
                              type: string
                            source:
                              type: string
                            destination:
                              type: string
                            method:
                              type: string
                            path:
                              type: string
                            verdict:
                              type: string
                            policy:
                              type: object
                              properties:
                                name:
                                  type: string
                                  nullable: true
                                version:
                                  type: string
                                  nullable: true
                                snapshot:
                                  type: object
                                  nullable: true
                            chain_depth:
                              type: integer
                            token_jti:
                              type: string
                              nullable: true
                            request_context:
                              type: object
                              nullable: true
                            token_context:
                              type: object
                              nullable: true
                            timestamp:
                              type: string
                              format: date-time
