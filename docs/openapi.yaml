    post:
      tags:
      - Gateway
      summary: Multi-hop chain evaluation with trace grouping
      description: Evaluates a sequence of hops (e.g., User -> Agent -> MCP -> Vault -> API) under a single trace.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - hops
              properties:
                hops:
                  type: array
                  items:
                    type: object
                    required:
                    - source
                    - destination
                    properties:
                      source:
                        type: string
                      destination:
                        type: string
                      method:
                        type: string
                        default: GET
                      path:
                        type: string
                        default: /
                  minItems: 1
                context:
                  type: object
      responses:
        '200':
          description: Chain evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  chain_verdict:
                    type: string
                    enum:
                    - allow
                    - deny
                  total_hops:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        hop_index:
                          type: integer
                        decision_id:
                          type: string
                        source:
                          type: string
                        destination:
                          type: string
                        verdict:
                          type: string
                        policy_name:
                          type: string
                          nullable: true
                        reason:
                          type: string
                        latency_ms:
                          type: integer
        '400':
          description: hops array required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
