openapi: 3.0.3
info:
  title: WID Platform API
  description: 'Workload Identity Defense Platform — complete API reference covering all services: Policy Engine, Discovery,
    Token Service, Credential Broker, Relay, and Edge Gateway.'
  version: 1.0.0
  contact:
    name: WID Platform
    url: https://github.com/pkvenu/wid-platform
servers:
- url: http://34.120.74.81
  description: GCP Production
- url: http://localhost:3001
  description: Policy Engine (local)
- url: http://localhost:3004
  description: Discovery Service (local)
- url: http://localhost:3000
  description: Token Service (local)
- url: http://localhost:3002
  description: Credential Broker (local)
- url: http://localhost:3005
  description: Relay Service (local)
tags:
- name: Auth
  description: User registration, login, logout, session management
- name: Tenant
  description: Tenant settings and user management
- name: Policies
  description: Policy CRUD, evaluation, compilation, templates
- name: Violations
  description: Policy violation tracking and resolution
- name: Compliance
  description: Compliance framework deployment and coverage
- name: Access Decisions
  description: Runtime access evaluation, decision audit log, chain tracing, replay
- name: Gateway
  description: Edge gateway evaluation and token validation
- name: AI Telemetry
  description: AI request event tracking, cost analysis
- name: MCP Telemetry
  description: MCP tool call event tracking
- name: Federation
  description: Hub-spoke relay registration, heartbeat, revocation, policy push
- name: Enforcement
  description: Enforcement summary and evidence
- name: Health
  description: Service health check
- name: Discovery
  description: Workload discovery, scanning, and statistics
- name: Graph
  description: Identity graph, attack paths, remediation, and timeline
- name: Connectors
  description: Cloud account connector CRUD, test, and scan
- name: Token
  description: Token exchange, validation, chain queries, and JWKS
- name: Credentials
  description: Credential brokering, rotation, lifecycle, and policies
- name: Relay
  description: Relay status, policy cache, sync, environments, and sovereignty
- name: Delegation
  description: On-Behalf-Of (OBO) delegation chain management
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register a new user and tenant
      description: Creates a new tenant organization and the first admin user. Sets JWT cookie on success.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              - name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                organization:
                  type: string
                  description: Tenant organization name. Defaults to "{name}'s Organization".
                data_region:
                  type: string
                  enum:
                  - us
                  - eu
                  - ap
                  default: us
      responses:
        '201':
          description: User and tenant created
          headers:
            Set-Cookie:
              schema:
                type: string
                example: wid_token=eyJhbG...; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserSummary'
                  tenant:
                    $ref: '#/components/schemas/TenantSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Organization name or email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: Login with email and password
      description: Authenticates user, sets JWT cookie with tenant context.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserSummary'
                  tenant:
                    $ref: '#/components/schemas/TenantSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/auth/logout:
    post:
      tags:
      - Auth
      summary: Logout (clear session cookie)
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /api/v1/auth/me:
    get:
      tags:
      - Auth
      summary: Get current authenticated user and tenant
      responses:
        '200':
          description: Authenticated user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                      name:
                        type: string
                      role:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      last_login:
                        type: string
                        format: date-time
                        nullable: true
                  tenant:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      slug:
                        type: string
                      plan:
                        type: string
                      data_region:
                        type: string
                      data_residency_strict:
                        type: boolean
        '401':
          description: Not authenticated or token expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  hasUsers:
                    type: boolean
                    description: Whether any users exist (only when unauthenticated)
  /api/v1/auth/status:
    get:
      tags:
      - Auth
      summary: Check whether any users exist
      description: Public endpoint. Returns whether the platform has been onboarded.
      security: []
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasUsers:
                    type: boolean
  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Admin password reset (bearer-token protected)
      security:
      - bearerResetToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  email:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Invalid reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/demo-reset:
    post:
      tags:
      - Auth
      summary: Demo reset — wipe tenant data (bearer-token protected)
      security:
      - bearerResetToken: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id:
                  type: string
                  format: uuid
                  description: Defaults to the default tenant if omitted.
      responses:
        '200':
          description: Reset completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  reset:
                    type: boolean
                  tenant_id:
                    type: string
                  deleted:
                    type: object
                    additionalProperties:
                      oneOf:
                      - type: integer
                      - type: string
        '403':
          description: Invalid reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/accept-invite:
    post:
      tags:
      - Auth
      summary: Accept a tenant invitation and create user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              - password
              - name
              properties:
                token:
                  type: string
                  description: Invitation token received via email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        '201':
          description: User created and joined tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserSummary'
                  tenant:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Invalid or expired invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tenant:
    get:
      tags:
      - Tenant
      summary: Get current tenant details with usage stats
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
      - Tenant
      summary: Update tenant settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                settings:
                  type: object
                data_region:
                  type: string
                  enum:
                  - us
                  - eu
                  - ap
                data_residency_strict:
                  type: boolean
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '400':
          description: No fields to update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tenant/users:
    get:
      tags:
      - Tenant
      summary: List tenant users
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantUser'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/tenant/invite:
    post:
      tags:
      - Tenant
      summary: Invite a user to the tenant (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum:
                  - admin
                  - operator
                  - viewer
                  default: viewer
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitation:
                    $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists in this tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: User limit reached for tenant plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies:
    get:
      tags:
      - Policies
      summary: List all policies
      parameters:
      - name: type
        in: query
        schema:
          type: string
        description: Filter by policy_type
      - name: enabled
        in: query
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      responses:
        '200':
          description: Policy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  policies:
                    type: array
                    items:
                      $ref: '#/components/schemas/Policy'
                  types:
                    type: object
                    description: Map of valid policy types
    post:
      tags:
      - Policies
      summary: Create a new policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyCreate'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: Missing name/conditions or invalid policy_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Policy name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/{id}:
    parameters:
    - $ref: '#/components/parameters/PolicyId'
    get:
      tags:
      - Policies
      summary: Get policy by ID
      responses:
        '200':
          description: Policy detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Policies
      summary: Update a policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyUpdate'
      responses:
        '200':
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: Nothing to update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Policies
      summary: Delete a policy
      responses:
        '200':
          description: Policy deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/policies/{id}/toggle:
    parameters:
    - $ref: '#/components/parameters/PolicyId'
    patch:
      tags:
      - Policies
      summary: Toggle policy enabled/disabled
      responses:
        '200':
          description: Policy toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  enabled:
                    type: boolean
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/policies/{id}/evaluate:
    parameters:
    - $ref: '#/components/parameters/PolicyId'
    post:
      tags:
      - Policies
      summary: Evaluate a single policy against all workloads
      description: Runs the policy engine against all registered workloads, creates violation records, and updates evaluation
        count.
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy:
                    type: string
                  evaluated:
                    type: integer
                  violations:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ViolationResult'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/policies/test:
    post:
      tags:
      - Policies
      summary: Dry-run policy conditions against all workloads
      description: Tests conditions without creating a policy. Returns violation count and compiled Rego preview.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - conditions
              properties:
                conditions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Condition'
                  minItems: 1
                actions:
                  type: array
                  items:
                    type: object
                severity:
                  type: string
                  enum:
                  - critical
                  - high
                  - medium
                  - low
                  - info
                policy_type:
                  type: string
                effect:
                  type: string
                scope_environment:
                  type: string
                scope_types:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  evaluated:
                    type: integer
                  violations:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ViolationResult'
                  compiled_preview:
                    type: string
                  compiler:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/policies/evaluate-all:
    post:
      tags:
      - Policies
      summary: Evaluate all enabled policies against all workloads
      description: Runs every enabled policy, inserts violation records, and returns per-policy results.
      responses:
        '200':
          description: Evaluation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  total_policies:
                    type: integer
                  total_workloads:
                    type: integer
                  total_violations:
                    type: integer
                  policies:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        type:
                          type: string
                        violations:
                          type: integer
                        evaluated:
                          type: integer
  /api/v1/policies/compile:
    post:
      tags:
      - Policies
      summary: Compile policy conditions to target language (Rego, etc.)
      parameters:
      - name: compiler
        in: query
        schema:
          type: string
        description: Target compiler (defaults to service config)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                conditions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Condition'
                actions:
                  type: array
                  items:
                    type: object
                severity:
                  type: string
      responses:
        '200':
          description: Compiled output
          content:
            application/json:
              schema:
                type: object
                properties:
                  compiler:
                    type: string
                  extension:
                    type: string
                  output:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/policies/templates:
    get:
      tags:
      - Policies
      summary: List policy templates
      parameters:
      - name: type
        in: query
        schema:
          type: string
        description: Filter by policy_type
      - name: finding_type
        in: query
        schema:
          type: string
        description: Filter by finding_type via remediation map
      - name: tag
        in: query
        schema:
          type: string
      - name: severity
        in: query
        schema:
          type: string
      - name: enabled
        in: query
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  source:
                    type: string
                    example: database
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                  types:
                    type: object
        '503':
          description: Templates not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
      - Policies
      summary: Create a new policy template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - name
              - policy_type
              properties:
                id:
                  type: string
                name:
                  type: string
                description:
                  type: string
                policy_type:
                  type: string
                severity:
                  type: string
                  enum:
                  - critical
                  - high
                  - medium
                  - low
                  - info
                conditions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Condition'
                actions:
                  type: array
                  items:
                    type: object
                scope_environment:
                  type: string
                effect:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                created_by:
                  type: string
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Template ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/templates/{templateId}:
    parameters:
    - name: templateId
      in: path
      required: true
      schema:
        type: string
    get:
      tags:
      - Policies
      summary: Get a single template by ID
      responses:
        '200':
          description: Template detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Policies
      summary: Update a policy template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                policy_type:
                  type: string
                severity:
                  type: string
                conditions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Condition'
                actions:
                  type: array
                  items:
                    type: object
                scope_environment:
                  type: string
                effect:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                enabled:
                  type: boolean
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  template:
                    $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Policies
      summary: Delete a policy template
      responses:
        '200':
          description: Template deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/policies/from-template/{templateId}:
    parameters:
    - name: templateId
      in: path
      required: true
      schema:
        type: string
    post:
      tags:
      - Policies
      summary: Create a policy from a template
      description: Instantiates a policy from a template. Supports workload scoping and enforcement mode override.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Override template name
                workload:
                  type: string
                  description: Workload name to scope the policy to
                client_workload_id:
                  type: string
                  format: uuid
                attack_path_id:
                  type: string
                enforcement_mode:
                  type: string
                  enum:
                  - audit
                  - enforce
                  default: audit
                created_by:
                  type: string
      responses:
        '201':
          description: Policy created from template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Policy already exists from this template
