  /api/v1/federation/register:
    post:
      tags:
      - Federation
      summary: Register a spoke relay with the hub
      description: 'Registers a new relay. If mTLS is active, validates the client certificate

        and extracts the SPIFFE ID. Duplicate SPIFFE IDs cause a re-registration update.

        '
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - environment_name
              - environment_type
              - region
              properties:
                environment_name:
                  type: string
                environment_type:
                  type: string
                  description: e.g., kubernetes, vm, cloud-run, ecs
                region:
                  type: string
                cluster_id:
                  type: string
                relay_version:
                  type: string
                  default: 1.0.0
                capabilities:
                  type: array
                  items:
                    type: string
                  default:
                  - policy-cache
                  - audit-forward
                tenant_id:
                  type: string
                  format: uuid
                data_region:
                  type: string
                data_residency_strict:
                  type: boolean
                  default: false
                allowed_regions:
                  type: array
                  items:
                    type: string
                webhook_url:
                  type: string
                  format: uri
                spiffe_id:
                  type: string
                  description: Claimed SPIFFE ID (verified against cert SAN if mTLS active)
      responses:
        '201':
          description: Relay registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayRegistration'
        '200':
          description: Relay re-registered (existing SPIFFE ID)
          content:
            application/json:
              schema:
                type: object
                properties:
                  relay_id:
                    type: string
                  status:
                    type: string
                    example: active
                  mtls_verified:
                    type: boolean
                  reregistered:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Certificate validation failed or SPIFFE ID mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/federation/heartbeat:
    post:
      tags:
      - Federation
      summary: Relay heartbeat with status update
      description: Updates relay status. If mTLS is active, verifies the cert fingerprint matches registration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - relay_id
              properties:
                relay_id:
                  type: string
                policy_version:
                  type: string
                policy_count:
                  type: integer
                audit_buffer_size:
                  type: integer
                adapter_count:
                  type: integer
                uptime_seconds:
                  type: integer
                status:
                  type: string
      responses:
        '200':
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  server_time:
                    type: string
                    format: date-time
        '400':
          description: relay_id required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Cert fingerprint mismatch or relay revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/federation/revoke/{relayId}:
    parameters:
    - name: relayId
      in: path
      required: true
      schema:
        type: string
    post:
      tags:
      - Federation
      summary: Revoke a spoke relay
      requestBody:
