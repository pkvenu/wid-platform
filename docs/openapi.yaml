              schema:
                $ref: '#/components/schemas/Error'
  /v1/proxy/{target}/{path}:
    summary: Credential injection proxy
    description: 'Proxies requests to a target API (stripe, github, openai, anthropic),

      injecting the appropriate credential from the secret store. Requires

      a valid Bearer token with a valid JTI. Policy-evaluated via OPA.

      '
    get:
      tags:
      - Credentials
      summary: Proxy GET to target API with injected credentials
      parameters:
      - name: target
        in: path
        required: true
        schema:
          type: string
          enum:
          - stripe
          - github
          - openai
          - anthropic
      - name: path
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Proxied response from target API
        '401':
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Target not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
      - Credentials
      summary: Proxy POST to target API with injected credentials
      parameters:
      - name: target
        in: path
        required: true
        schema:
          type: string
      - name: path
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
