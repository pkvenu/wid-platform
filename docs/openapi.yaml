  /api/v1/federation/bootstrap-cert:
    post:
      tags:
      - Federation
      summary: Bootstrap client certificate for a relay (one-time token)
      description: Issues an EC P-256 keypair for environments without SPIRE. Uses a one-time registration token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - registration_token
