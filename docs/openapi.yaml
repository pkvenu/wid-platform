      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  payload:
                    type: object
                  spiffe_id:
                    type: string
                  trust_level:
                    type: string
                  wid:
                    type: object
                  reason:
                    type: string
                    description: Present when valid is false
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/gateway/evaluate:
    post:
      tags:
      - Gateway
      summary: Edge gateway policy evaluation checkpoint
      description: 'The main enforcement endpoint called by the edge gateway before forwarding requests.

        Evaluates enforce and audit policies, validates WID tokens if present,

        and returns allow/deny with full audit context.

        '
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - source
              - destination
              properties:
                source:
                  type: string
                  description: Source workload name
                destination:
                  type: string
                  description: Destination workload or external service name
                method:
                  type: string
                  default: GET
                path:
                  type: string
                  default: /
                headers:
                  type: object
                context:
                  type: object
                  description: Additional runtime context (trace_id, hop_index, etc.)
                wid_token:
                  type: string
                  description: WID token for identity validation
      responses:
        '200':
          description: Gateway evaluation result (allow)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayEvalResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Denied due to invalid/expired WID token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayEvalResult'
