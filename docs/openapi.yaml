                  type: string
                  description: Custom SPIFFE ID (defaults to spiffe://wid-platform/relay/{environment_name})
      responses:
        '200':
          description: Certificate issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: issued
                  spiffe_id:
                    type: string
                  public_key:
                    type: string
                  private_key:
                    type: string
                  ca_bundle:
                    type: string
                    nullable: true
                  instructions:
                    type: array
                    items:
                      type: string
                  expires_in:
                    type: string
                    example: 24h
                  note:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Invalid registration token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
