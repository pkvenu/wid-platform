  /api/v1/workloads/{id}/verify:
    post:
      tags:
      - Discovery
      summary: Verify (attest) a workload
      description: 'Runs attestation engine if evidence is provided, otherwise performs manual approval.

        Issues a WID Token upon successful verification.

        '
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum:
                  - attest
                  - manual
                  description: Attestation method
                evidence:
                  type: object
                  description: Attestation evidence payload
                approved_by:
                  type: string
                approval_reason:
                  type: string
      responses:
        '200':
          description: Workload verified and WID Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  trust_level:
                    type: string
                    enum:
                    - cryptographic
                    - high
                    - medium
                    - low
                    - none
                  verification_method:
                    type: string
                  attestation_expires:
                    type: string
                    format: date-time
                  token:
                    $ref: '#/components/schemas/WidToken'
                  workload:
                    $ref: '#/components/schemas/Workload'
        '404':
          description: Workload not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
